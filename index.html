    <!-- Campaign & Rewardful Merge-Safe Helper -->
    <script>
    (function () {
      /* Parameters to capture */
      const keys = [
        // UTM fields
        'utm_source','utm_medium','utm_campaign','utm_content','utm_term',
        // Click-ID fields
        'gclid','gbraid','wbraid',      // Google Ads / P-Max
        'fbclid',                      // Meta / Instagram / Facebook
        'msclkid',                     // Microsoft Ads / Bing
        'ttclid','tt_conv_id',         // TikTok Ads
        'li_fat_id',                   // LinkedIn Ads
        // Beehiiv
        'bhid','beehiiv_id',           // Beehiiv UTM params
        // Rewardful referral
        'rewardfulCode',
        // Optional internal flag
        'via'
      ];

      /* Read existing cookie */
      const match = /(?:^|;\s*)sp_utm=([^;]+)/.exec(document.cookie);
      let stored  = {};
      if (match) {
        try { stored = JSON.parse(decodeURIComponent(match[1])); }
        catch (_) {}
      }

      /* Collect params from current URL */
      const qs    = new URLSearchParams(location.search);
      const fresh = {};
      keys.forEach(k => {
        if (qs.has(k)) {
          fresh[k] = qs.get(k).slice(0, 512);   // truncate long values
        }
      });

      /* Merge: new keys overwrite old ones */
      const merged = { ...stored, ...fresh };

      /* Rewrite cookie only if something changed */
      if (Object.keys(fresh).length && JSON.stringify(merged) !== JSON.stringify(stored)) {
        // Dynamically set the cookie domain for prod or staging
        let cookieDomain = '.superpower.com';
        if (location.hostname.endsWith('.superpower-staging.com')) {
          cookieDomain = '.superpower-staging.com';
        }
        document.cookie =
          'sp_utm=' + encodeURIComponent(JSON.stringify(merged)) + ';' +
          'domain=' + cookieDomain + ';' +
          'path=/;' +
          'max-age=' + 60*60*24*90 + ';' +
          'SameSite=Lax;' +
          'Secure';
      }

      /* Register with Segment */
      if (window.analytics && analytics.register) {
        analytics.register({ campaign: merged });
      }
    })();
    </script>
    <!-- End Campaign & Rewardful Merge-Safe Helper -->
