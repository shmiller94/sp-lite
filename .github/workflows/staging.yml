# This action is intended for cutting a staging release!
#
# This workflow will:
#
# 1. Build server
# 2. Run tests
# 3. Build and push Docker image tagged with "${shortCommitSHA}-stg" to AWS ECR
#
# Once the image is pushed, it will show up when running `make deploy/*/stg`.
#

on:
  workflow_dispatch:

jobs:
  build-test-and-push:
    name: build-test-and-push
    environment: staging
    runs-on: arm-2cpu-8gbmem-75gbssd
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Set git short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Run build, unit & e2e tests, lint, type checks
        run: make test
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Login to AWS ECR
        run: make util/login-aws-ecr
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build & push docker app image (for staging)
        run: VERSION="${{ steps.vars.outputs.sha_short }}-stg" make build/docker/app/stg
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - name: Create tag
        uses: mathieudutour/github-tag-action@v6.1
        id: create_tag
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          fetch_all_tags: true
